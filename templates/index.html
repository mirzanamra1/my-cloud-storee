<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahal's Cloud Store</title>
    <style>
        :root {
            --primary-blue: #007bff;
            --cloud-bg: #f0f8ff;
        }
        body {
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                              url('https://images.unsplash.com/photo-1544197150-b99a580bb7a8?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-attachment: fixed;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .store-container {
            background: rgba(255, 255, 255, 0.95);
            max-width: 800px;
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            padding: 40px;
            backdrop-filter: blur(5px);
        }
        .header {
            text-align: center;
            border-bottom: 2px solid var(--primary-blue);
            margin-bottom: 30px;
            padding-bottom: 10px;
        }
        .header h1 {
            color: var(--primary-blue);
            margin: 0;
            font-size: 2.5em;
        }
        .product-list {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }
        .product-card {
            display: flex;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #eee;
            transition: transform 0.2s;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .product-image {
            width: 200px;
            height: 200px;
            object-fit: cover;
            background: #f9f9f9;
        }
        .product-details {
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex-grow: 1;
        }
        .product-name {
            font-size: 1.4em;
            margin: 0 0 10px 0;
            color: #2c3e50;
        }
        .product-desc {
            color: #7f8c8d;
            margin-bottom: 15px;
            line-height: 1.4;
        }
        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .price-tag {
            font-size: 1.5em;
            font-weight: bold;
            color: #27ae60;
        }
        .buy-btn {
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .buy-btn:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<div class="store-container">
    <div class="header">
        <h1>☁️ Sahal's Cloud Store</h1>
        <p>Premium Infrastructure Hardware</p>
    </div>

    <div class="product-list">
        {% for product in products %}
        <div class="product-card">
            {% if 'Laptop' in product.name %}
                <img src="https://www.shutterstock.com/image-photo/personal-cybersecurity-cloud-storage-technology-600nw-2418328651.jpg" class="product-image">
            {% elif 'Mouse' in product.name %}
                <img src="https://m.media-amazon.com/images/I/646144d8b8b9806a4c5db2bd-aogtunal-wireless-mouse-bluetooth.jpg" class="product-image">
            {% elif 'Keyboard' in product.name %}
                <img src="https://m.media-amazon.com/images/I/71Sl9tngKEL._AC_UF1000,1000_QL80_.jpg" class="product-image">
            {% else %}
                <img src="https://via.placeholder.com/200?text=Cloud+Gear" class="product-image">
            {% endif %}

            <div class="product-details">
                <h3 class="product-name">{{ product.name }}</h3>
                <p class="product-desc">{{ product.description }}</p>
                <div class="price-row">
                    <span class="price-tag">${{ product.price }}</span>
                    <button class="buy-btn">Add to Cart</button>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

</body>
</html>
